<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk-UA">
<head>
    <meta charset="UTF-8">
    <title>Відновлення пароля</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">

<div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <h2 style="color: #333333; text-align: center;">Відновлення доступу</h2>

    <p style="color: #555555; font-size: 16px; line-height: 1.5;">Привіт!</p>
    <p style="color: #555555; font-size: 16px; line-height: 1.5;">Ми отримали запит на скидання пароля для вашого акаунту. Натисніть кнопку нижче, щоб встановити новий пароль:</p>

    <div style="text-align: center; margin: 30px 0;">
        <a th:href="${resetLink}" style="background-color: #007bff; color: white; padding: 14px 28px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 16px; display: inline-block;">
            Скинути пароль
        </a>
    </div>

    <p style="color: #999999; font-size: 14px; margin-top: 30px; border-top: 1px solid #eeeeee; padding-top: 20px; text-align: center;">
        Якщо ви не робили цей запит, просто проігноруйте цей лист. Посилання дійсне 15 хвилин.
    </p>
</div>

</body>
</html>
