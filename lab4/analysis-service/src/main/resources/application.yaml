server:
  port: 8087

spring:
  application:
    name: analysis-service
  datasource:
    url: jdbc:h2:mem:analysisdb
    driverClassName: org.h2.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 3s
          multiplier: 2.0
          max-interval: 15s
          max-retries: 3
        default-requeue-rejected: false

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry: ${JWT_EXPIRY}

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@localhost:8761/eureka/