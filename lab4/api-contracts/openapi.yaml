openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
  - url: http://localhost:8080/api
    description: Generated server url
paths:
  /users/me:
    get:
      tags:
        - User Profile
      summary: Отримати дані свого профілю
      operationId: getMyProfile
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/UserResponse"
    put:
      tags:
        - User Profile
      summary: Оновити дані свого профілю
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/UserResponse"
  /users/me/password:
    put:
      tags:
        - User Profile
      summary: Змінити свій пароль
      operationId: changePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
        required: true
      responses:
        "200":
          description: OK
  /organizations/{organizationId}/members/{userId}/role:
    put:
      tags:
        - Memberships
      summary: Оновити роль користувача
      operationId: updateRole
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
        required: true
      responses:
        "200":
          description: OK
  /organizations/{id}:
    get:
      tags:
        - Organizations
      summary: Отримати інформацію про конкретну організацію за її ID
      operationId: getById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
    put:
      tags:
        - Organizations
      summary: Оновити назву та billing email організації
      operationId: update
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
    delete:
      tags:
        - Organizations
      summary: Видалити організацію
      operationId: delete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
  /organizations:
    get:
      tags:
        - Organizations
      summary: Отримати всі свої організації
      operationId: getAllMyOrganizations
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizationResponse"
    post:
      tags:
        - Organizations
      summary: Створити нову організацію
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
  /organizations/{organizationId}/subscription/checkout:
    post:
      tags:
        - Subscriptions
      summary: Отримати посилання на оплату для переходу на новий тариф
      operationId: createCheckout
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePlanRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                type: object
                additionalProperties:
                  type: string
  /organizations/{organizationId}/subscription/cancel:
    post:
      tags:
        - Subscriptions
      summary: Скасувати поточну підписку
      operationId: cancel
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
  /organizations/{organizationId}/members:
    post:
      tags:
        - Memberships
      summary: Запросити користувача в організацію
      operationId: invite
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMemberRequest"
        required: true
      responses:
        "200":
          description: OK
  /organizations/{organizationId}/analysis/comment:
    post:
      tags:
        - Semantic Analysis
      summary: Проаналізувати семантику тексту коментаря
      operationId: analyze
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeCommentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/AnalyzeCommentResponse"
  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Скидання пароля
      operationId: resetPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
        required: true
      responses:
        "200":
          description: OK
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Реєстрація нового користувача
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Оновлення access токена
      operationId: refresh
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Вхід у систему
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Запит на відновлення пароля
      operationId: forgotPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
        required: true
      responses:
        "200":
          description: OK
  /organizations/{organizationId}/subscription:
    get:
      tags:
        - Subscriptions
      summary: Отримати поточну підписку організації
      operationId: getCurrent
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
  /organizations/{organizationId}/limits:
    get:
      tags:
        - Resource Limits
      summary: Отримати поточні ліміти та їх використання для організації
      operationId: getLimits
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/ResourceLimitResponse"
  /organizations/{organizationId}/audit:
    get:
      tags:
        - Audit Logs
      summary: Отримати журнал дій організації
      operationId: getAuditLogs
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
      responses:
        "200":
          description: OK
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/PageActivityLogResponse"
  /organizations/{organizationId}/members/{userId}:
    delete:
      tags:
        - Memberships
      summary: Видалити користувача з організації
      operationId: remove
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
components:
  schemas:
    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          maxLength: 50
          minLength: 0
        lastName:
          type: string
          maxLength: 50
          minLength: 0
        email:
          type: string
          format: email
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
    ChangePasswordRequest:
      type: object
      properties:
        oldPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          maxLength: 2147483647
          minLength: 6
      required:
        - newPassword
        - oldPassword
    UpdateRoleRequest:
      type: object
      properties:
        role:
          type: string
          enum:
            - OWNER
            - ADMIN
            - ANALYST
            - VIEWER
      required:
        - role
    OrganizationRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        billingEmail:
          type: string
          format: email
          minLength: 1
      required:
        - billingEmail
        - name
    OrganizationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        billingEmail:
          type: string
    ChangePlanRequest:
      type: object
      properties:
        plan:
          type: string
          enum:
            - FREE
            - STARTUP
            - PRO
      required:
        - plan
    SubscriptionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        organizationId:
          type: integer
          format: int64
        plan:
          type: string
          enum:
            - FREE
            - STARTUP
            - PRO
        status:
          type: string
          enum:
            - ACTIVE
            - CANCELED
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
    InviteMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        role:
          type: string
          enum:
            - OWNER
            - ADMIN
            - ANALYST
            - VIEWER
      required:
        - email
        - role
    AnalyzeCommentRequest:
      type: object
      properties:
        text:
          type: string
          maxLength: 2000
          minLength: 0
      required:
        - text
    AnalyzeCommentResponse:
      type: object
      properties:
        originalText:
          type: string
        sentiment:
          type: string
        confidenceScore:
          type: number
          format: double
        spam:
          type: boolean
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          maxLength: 2147483647
          minLength: 6
      required:
        - newPassword
        - token
    RegistrationRequest:
      type: object
      properties:
        firstName:
          type: string
          maxLength: 50
          minLength: 0
        lastName:
          type: string
          maxLength: 50
          minLength: 0
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          maxLength: 2147483647
          minLength: 6
      required:
        - email
        - firstName
        - lastName
        - password
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
    RefreshTokenRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
        - token
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
        - email
        - password
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
      required:
        - email
    ResourceLimitResponse:
      type: object
      properties:
        organizationId:
          type: integer
          format: int64
        maxComments:
          type: integer
          format: int32
        usedCommentsCount:
          type: integer
          format: int32
    ActivityLogResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        organizationId:
          type: integer
          format: int64
        action:
          type: string
        ipAddress:
          type: string
        createdAt:
          type: string
          format: date-time
    PageActivityLogResponse:
      type: object
      properties:
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ActivityLogResponse"
        number:
          type: integer
          format: int32
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        sort:
          $ref: "#/components/schemas/SortObject"
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        paged:
          type: boolean
        sort:
          $ref: "#/components/schemas/SortObject"
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        unsorted:
          type: boolean
        sorted:
          type: boolean