server:
  port: 8082

spring:
  application:
    name: iam-service
  datasource:
    url: jdbc:h2:mem:iamdb
    driverClassName: org.h2.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  autoconfigure:
    exclude: org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry: ${JWT_EXPIRY}
  refresh:
    expiry: ${ACCESS_EXPIRY}

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:8761/eureka/