server:
  port: 8081
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry: ${JWT_EXPIRY}
  refresh:
    expiry: ${ACCESS_EXPIRY}
  frontend:
    url: ${FRONTEND_URL}

spring:
  application:
    name: core-monolith
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_EMAIL}
    password: ${SMTP_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:h2:mem:${DB_SOURCE}
    driverClassName: org.h2.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true

stripe:
  api-key: ${STRIPE_SECRET}
  webhook-secret: ${WEBHOOK_SECRET}

eureka:
  client:
    serviceUrl:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:8761/eureka/