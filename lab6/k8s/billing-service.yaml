apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
    spec:
      containers:
        - name: billing
          image: lab5-billing-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8086
          env:
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: DB_PASSWORD
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: RABBITMQ_PASSWORD
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRY
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: JWT_EXPIRY
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: FRONTEND_URL
            - name: STRIPE_SECRET
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: STRIPE_SECRET
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: WEBHOOK_SECRET
            - name: EUREKA_HOST
              value: "discovery-server"
            - name: EUREKA_PORT
              value: "8761"
            - name: EUREKA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: EUREKA_USERNAME
            - name: EUREKA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: saas-secrets
                  key: EUREKA_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  selector:
    app: billing
  ports:
    - protocol: TCP
      port: 8086
      targetPort: 8086